<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FPS Helmet HUD Demo</title>
<style>

body{margin:0;overflow:hidden;background:transparent;}
canvas{position:absolute;top:0;left:0;}
</style>
</head>

<body>
<canvas id="hudCanvas"></canvas>

<script>
const canvas = document.getElementById("hudCanvas");
const ctx = canvas.getContext("2d");

// Resize canvas
function resizeCanvas(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

// Variables
let bpm = 80;
let panicLevel = 0;
let threatNearby = false;
let waveData = new Array(500).fill(0);
let phase = 0;


// =============== ESP32 WEB SERIAL ===============
const connectBtn = document.createElement("button");
connectBtn.textContent = "CONNECT ESP32";
connectBtn.style.position = "fixed";
connectBtn.style.top = "10px";
connectBtn.style.right = "10px";
connectBtn.style.padding = "10px";
connectBtn.style.background = "#00ffcc";
connectBtn.style.border = "none";
connectBtn.style.cursor = "pointer";
document.body.appendChild(connectBtn);

let serialPort;
let reader;
let emgBuffer = [];

connectBtn.onclick = async () => {
  try {
    serialPort = await navigator.serial.requestPort();
    await serialPort.open({ baudRate: 115200 });

    reader = serialPort.readable.getReader();
    const decoder = new TextDecoder();

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      const text = decoder.decode(value);
      handleSerialData(text);
    }
  } catch (err) {
    console.error("Serial connection error:", err);
  }
};

// ================= HANDLE SERIAL =================
function handleSerialData(line) {
  // Example ESP32 EMG output: "EMG:0.56"
  const parts = line.trim().split(":");
  if (parts[0] === "EMG") {
    const val = parseFloat(parts[1]);
    if (!isNaN(val)) {
      updateEMG(val);
    }
  }
}

// ================= EMG → Heart Rate =================
function updateEMG(emgValue) {
  // Store recent EMG values
  emgBuffer.push(emgValue);
  if (emgBuffer.length > 500) emgBuffer.shift();

  // Simple heartbeat estimation: count peaks
  let peaks = 0;
  for (let i = 1; i < emgBuffer.length - 1; i++) {
    if (emgBuffer[i] > 0.6 && emgBuffer[i] > emgBuffer[i-1] && emgBuffer[i] > emgBuffer[i+1]) {
      peaks++;
    }
  }

  // Rough BPM calculation
  bpm = Math.min(200, Math.max(50, peaks * 12)); // scaling factor may need adjustment

  // Panic level based on heart rate
  panicLevel = bpm > 130 ? (bpm-130)/50 : panicLevel*0.95;
  threatNearby = panicLevel > 0.5;
}

// =============== DRAW FRAME ===============
function drawHelmetFrame(){
  const w = canvas.width, h = canvas.height;
  ctx.save();
  ctx.strokeStyle="#00ffcc";
  ctx.lineWidth=2;
  ctx.shadowColor="#00ffcc";
  ctx.shadowBlur=10;

  // Corner brackets only
  const bracketSize = 40;
  // TL
  ctx.beginPath();
  ctx.moveTo(20,20+bracketSize); ctx.lineTo(20,20); ctx.lineTo(20+bracketSize,20); ctx.stroke();
  // TR
  ctx.beginPath();
  ctx.moveTo(w-20-bracketSize,20); ctx.lineTo(w-20,20); ctx.lineTo(w-20,20+bracketSize); ctx.stroke();
  // BL
  ctx.beginPath();
  ctx.moveTo(20,h-20-bracketSize); ctx.lineTo(20,h-20); ctx.lineTo(20+bracketSize,h-20); ctx.stroke();
  // BR
  ctx.beginPath();
  ctx.moveTo(w-20-bracketSize,h-20); ctx.lineTo(w-20,h-20); ctx.lineTo(w-20,h-20-bracketSize); ctx.stroke();

  ctx.restore();
}

// =============== ALERTS ===============
function drawAlerts(){
  const centerX = canvas.width/2;
  const centerY = canvas.height/2;

  if(threatNearby){
    const alpha = 0.6 + Math.random()*0.4;
    ctx.save();
    ctx.font = `${50 + panicLevel*20}px monospace`;
    ctx.textAlign = "center";
    ctx.fillStyle = `rgba(255,0,0,${alpha})`;
    ctx.shadowColor = "red";
    ctx.shadowBlur = 20*panicLevel;
    const xJitter = (Math.random()-0.5)*20*panicLevel;
    const yJitter = (Math.random()-0.5)*10*panicLevel;
    ctx.fillText("⚠ ALERT ⚠", centerX + xJitter, 60 + yJitter);
    ctx.restore();

    if(panicLevel>0.7){
      ctx.save();
      ctx.font = `${80 + panicLevel*40}px monospace`;
      ctx.textAlign = "center";
      ctx.fillStyle = `rgba(255,0,0,${0.5 + Math.random()*0.5})`;
      ctx.shadowColor = "red";
      ctx.shadowBlur = 30*panicLevel;
      const xB = (Math.random()-0.5)*30*panicLevel;
      const yB = (Math.random()-0.5)*20*panicLevel;
      ctx.fillText("⚠ BIOHAZARD ⚠", centerX + xB, centerY + yB);
      ctx.restore();
    }
  }
}

// =============== WAVEFORM ===============
function drawWaveform(){
  const xOffset = canvas.width - 400;
  const yOffset = canvas.height/2;
  ctx.save();
  ctx.beginPath();
  for(let i=0;i<waveData.length;i++){
    const y = waveData[i]*25;
    if(i===0) ctx.moveTo(xOffset + i, yOffset - y);
    else ctx.lineTo(xOffset + i, yOffset - y);
  }
  ctx.strokeStyle = "#00ffcc";
  ctx.lineWidth = 2;
  ctx.shadowColor="#00ffcc";
  ctx.shadowBlur=15;
  ctx.stroke();
  ctx.restore();
  phase += 0.15 + panicLevel*0.3;
waveData.push(
  Math.sin(phase)*(1 + panicLevel*2) +
  (Math.random()-0.5)*0.5
);
waveData.shift();
}

// =============== STATUS ===============
function drawStatus(){
  ctx.save();
  ctx.font = "20px monospace";
  ctx.fillStyle = "#00ffcc";
  ctx.shadowColor="#00ffcc";
  ctx.shadowBlur=10;
  ctx.fillText(`HR: ${Math.floor(bpm)} BPM`, 20, canvas.height - 20);

  let status = "STABLE";
  if(bpm>110) status="ELEVATED";
  if(bpm>130) status="CRITICAL";
  ctx.fillText(`STATUS: ${status}`, 20, canvas.height - 50);
  ctx.restore();
}

// =============== GLITCH ===============

function drawGlitch(){
  if(!threatNearby) return;

  const shake = panicLevel*20;
  canvas.style.transform =
    `translate(${(Math.random()-0.5)*shake}px, ${(Math.random()-0.5)*shake}px)`;

  // ⚠️ NO full-screen fills (keeps transparency clean)

  // RGB split lines instead
  for(let i=0;i<10;i++){
    const y = Math.random()*canvas.height;
    const offset = (Math.random()-0.5)*20;

    ctx.fillStyle = "rgba(255,0,0,0.2)";
    ctx.fillRect(offset, y, canvas.width, 1);

    ctx.fillStyle = "rgba(0,255,255,0.2)";
    ctx.fillRect(-offset, y+1, canvas.width, 1);
  }
}

// =============== LOOP ===============

function loop(){
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawHelmetFrame();
  drawWaveform();

function drawGlitch(){
  if(!threatNearby) return;

  const shake = panicLevel*20;
  canvas.style.transform =
    `translate(${(Math.random()-0.5)*shake}px, ${(Math.random()-0.5)*shake}px)`;

  // ⚠️ NO full-screen fills (keeps transparency clean)

  // RGB split lines instead
  for(let i=0;i<10;i++){
    const y = Math.random()*canvas.height;
    const offset = (Math.random()-0.5)*20;

    ctx.fillStyle = "rgba(255,0,0,0.2)";
    ctx.fillRect(offset, y, canvas.width, 1);

    ctx.fillStyle = "rgba(0,255,255,0.2)";
    ctx.fillRect(-offset, y+1, canvas.width, 1);
  }
}


  drawAlerts();
  drawStatus();

  requestAnimationFrame(loop);
}

loop();

// =============== DEMO PANIC ===============
setInterval(()=>{
  bpm = 80 + Math.random()*100;
  panicLevel = bpm>130 ? (bpm-130)/50 : panicLevel*0.95;
  threatNearby = Math.random() < (panicLevel*0.7);
},300);
</script>
</body>
</html>
