<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FPS Helmet HUD Pro</title>
<style>
body{margin:0;overflow:hidden;background:#01030a;}
canvas{position:absolute;top:0;left:0;}
button{
  position:fixed;top:10px;right:10px;padding:10px;
  background:#00ffcc;border:none;color:#01030a;font-weight:bold;cursor:pointer;
}
</style>
</head>
<body>
<canvas id="hudCanvas"></canvas>
<button id="connect">CONNECT ESP32</button>
<script>
const canvas=document.getElementById("hudCanvas");
const ctx=canvas.getContext("2d");

// Resize canvas
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
window.addEventListener("resize",resize); resize();

// Variables
let bpm=80, panicLevel=0, threatNearby=false;
let waveData=new Array(500).fill(0), phase=0;

// ================= ESP32 EMG =================a
let serialPort, reader, emgBuffer=[];
document.getElementById("connect").onclick=async()=>{
  try{
    serialPort=await navigator.serial.requestPort();
    await serialPort.open({baudRate:115200});
    reader=serialPort.readable.getReader();
    const decoder=new TextDecoder();
    while(true){
      const {value,done}=await reader.read();
      if(done) break;
      const line=decoder.decode(value);
      handleSerial(line);
    }
  }catch(e){console.error(e);}
};

function handleSerial(line){
  const parts=line.trim().split(":");
  if(parts[0]==="EMG"){
    const val=parseFloat(parts[1]);
    if(!isNaN(val)) updateEMG(val);
  }
}

function updateEMG(emg){
  emgBuffer.push(emg);
  if(emgBuffer.length>500) emgBuffer.shift();

  let peaks=0;
  for(let i=1;i<emgBuffer.length-1;i++){
    if(emgBuffer[i]>0.6 && emgBuffer[i]>emgBuffer[i-1] && emgBuffer[i]>emgBuffer[i+1]) peaks++;
  }
  bpm=Math.min(200,Math.max(50,peaks*12));
  panicLevel=bpm>130?(bpm-130)/50:panicLevel*0.95;
  threatNearby=panicLevel>0.5;
}

// ================= HUD FRAME =================
function drawFrame(){
  const w=canvas.width,h=canvas.height;
  ctx.save();
  ctx.strokeStyle="#00ffcc"; ctx.lineWidth=2; ctx.shadowColor="#00ffcc"; ctx.shadowBlur=10;

  // Corner brackets
  const b=40;
  ctx.beginPath();ctx.moveTo(20,20+b);ctx.lineTo(20,20);ctx.lineTo(20+b,20);ctx.stroke();
  ctx.beginPath();ctx.moveTo(w-20-b,20);ctx.lineTo(w-20,20);ctx.lineTo(w-20,20+b);ctx.stroke();
  ctx.beginPath();ctx.moveTo(20,h-20-b);ctx.lineTo(20,h-20);ctx.lineTo(20+b,h-20);ctx.stroke();
  ctx.beginPath();ctx.moveTo(w-20-b,h-20);ctx.lineTo(w-20,h-20);ctx.lineTo(w-20,h-20-b);ctx.stroke();

  // Subtle HUD arcs
  ctx.beginPath();
  ctx.arc(w/2,h/2,100,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();
  ctx.arc(w/2,h/2,200,0,Math.PI*2);ctx.stroke();
  ctx.restore();
}

// ================= ALERTS =================
function drawAlerts(){
  const cx=canvas.width/2,cy=canvas.height/2;
  if(threatNearby){
    // Top alert
    let alpha=0.6+Math.random()*0.4;
    ctx.save();
    ctx.font=`${50+panicLevel*20}px monospace`;
    ctx.textAlign="center";
    ctx.fillStyle=`rgba(255,0,0,${alpha})`;
    ctx.shadowColor="red"; ctx.shadowBlur=20*panicLevel;
    const xJ=(Math.random()-0.5)*20*panicLevel;
    const yJ=(Math.random()-0.5)*10*panicLevel;
    ctx.fillText("⚠ ALERT ⚠", cx+xJ, 60+yJ);
    ctx.restore();

    // Center BIOHAZARD
    if(panicLevel>0.7){
      ctx.save();
      ctx.font=`${80+panicLevel*40}px monospace`;
      ctx.textAlign="center";
      ctx.fillStyle=`rgba(255,0,0,${0.5+Math.random()*0.5})`;
      ctx.shadowColor="red"; ctx.shadowBlur=30*panicLevel;
      const xb=(Math.random()-0.5)*30*panicLevel;
      const yb=(Math.random()-0.5)*20*panicLevel;
      ctx.fillText("⚠ BIOHAZARD ⚠", cx+xb, cy+yb);
      ctx.restore();
    }
  }
}

// ================= WAVEFORM =================
function drawWaveform(){
  const xOff=canvas.width-400, yOff=canvas.height/2;
  ctx.save();
  ctx.beginPath();
  for(let i=0;i<waveData.length;i++){
    const y=waveData[i]*25;
    if(i===0) ctx.moveTo(xOff+i,yOff-y);
    else ctx.lineTo(xOff+i,yOff-y);
  }
  ctx.strokeStyle="#00ffcc"; ctx.lineWidth=2;
  ctx.shadowColor="#00ffcc"; ctx.shadowBlur=15; ctx.stroke();
  ctx.restore();
  phase+=0.15+panicLevel*0.3;
  waveData.push(Math.sin(phase)*(1+panicLevel*2)+(Math.random()-0.5)*0.5);
  waveData.shift();
}

// ================= STATUS =================
function drawStatus(){
  ctx.save();
  ctx.font="20px monospace";
  ctx.fillStyle="#00ffcc"; ctx.shadowColor="#00ffcc"; ctx.shadowBlur=10;
  ctx.fillText(`HR: ${Math.floor(bpm)} BPM`, 20, canvas.height-20);
  let status="STABLE";
  if(bpm>110) status="ELEVATED";
  if(bpm>130) status="CRITICAL";
  ctx.fillText(`STATUS: ${status}`,20,canvas.height-50);
  ctx.restore();
}

// ================= GLITCH =================
function drawGlitch(){
  if(!threatNearby) return;
  // Shake
  const shake=panicLevel*20;
  canvas.style.transform=`translate(${(Math.random()-0.5)*shake}px, ${(Math.random()-0.5)*shake}px)`;
  // RGB split + overlay
  const alpha=0.05+Math.random()*0.2*panicLevel;
  ctx.fillStyle=`rgba(${Math.random()<0.5?255:0},${Math.random()<0.5?255:0},0,${alpha})`;
  ctx.fillRect(0,0,canvas.width,canvas.height);
  // scanlines
  for(let i=0;i<8;i++){
    const y=Math.random()*canvas.height;
    ctx.fillStyle=`rgba(${Math.random()<0.5?255:0},${Math.random()<0.5?255:0},0,0.2)`;
    ctx.fillRect(0,y,canvas.width,2);
  }
}

// ================= LOOP =================
function loop(){
  ctx.fillStyle="rgba(0,0,0,0.05)"; ctx.fillRect(0,0,canvas.width,canvas.height);
  drawFrame(); drawWaveform(); drawGlitch(); drawAlerts(); drawStatus();
  requestAnimationFrame(loop);
}
loop();

// ================= DEMO PANIC =================
setInterval(()=>{
  bpm=80+Math.random()*100;
  panicLevel=bpm>130?(bpm-130)/50:panicLevel*0.95;
  threatNearby=Math.random()<(panicLevel*0.7);
},300);
</script>
</body>
</html>
